# Codemagic CI/CD — builds the BlackOut iOS app on a cloud Mac (no local Mac needed).
#
# HOW IT WORKS: Codemagic spins up a macOS VM, generates the native iOS project from
# the Capacitor config (npx cap add ios), installs CocoaPods, fetches/creates the
# signing certificates from your Apple account via the App Store Connect API key,
# builds a signed .ipa, and uploads it to TestFlight / App Store Connect.
#
# PREREQS (one-time, done in the Codemagic + Apple web UIs — see WINDOWS-SETUP.md):
#   1. Apple Developer account active ($99/yr)
#   2. App record created in App Store Connect (bundle id com.blackout-trades.app)
#   3. An App Store Connect API key created and added to Codemagic as an integration
#      named exactly "BlackOut ASC" (Team → Integrations → App Store Connect)
#   4. This repo connected in Codemagic

workflows:
  ios-release:
    name: BlackOut iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BlackOut ASC   # <-- must match the integration name in Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.blackout-trades.app
      vars:
        BUNDLE_ID: "com.blackout-trades.app"
        APPLE_TEAM_ID: "ZA32C782N5"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6787797476
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci || npm install
      - name: Generate native iOS project (Capacitor)
        script: |
          npx cap add ios || echo "ios platform already present"
          npx cap sync ios
      - name: Set up code signing (auto via App Store Connect API key)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true       # lands in TestFlight; promote to App Store from the web UI
        # submit_to_app_store: false     # flip to true once you're ready to push to review
