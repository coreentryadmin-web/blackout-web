# Railway config for Vector-Walls-Warm cron.
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.vector-walls-warm.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/vector-walls-warm"
cronSchedule = "*/5 11-21 * * 1-5"
restartPolicyType = "never"
numReplicas = 1
