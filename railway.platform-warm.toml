# Railway config for the Platform-Warm cron service.
# Wire it up: service Settings -> Config-as-code -> set path to "railway.platform-warm.toml"
# Requires CRON_SECRET on this service (same value as blackout-web).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.platform-warm.toml",
  "nixpacks.toml",
]

[deploy]
# Fan-out across desk + heatmap + vector + zerodte lanes can exceed 120s on cold Polygon/UW.
startCommand = "CRON_HTTP_TIMEOUT_MS=300000 node scripts/hit-cron.mjs /api/cron/platform-warm"
# Every 5 min 24/7 — route self-skips outside RTH unless CACHE_WARM_OFF_HOURS=1 (prod).
cronSchedule = "*/5 * * * *"
restartPolicyType = "ON_FAILURE"
numReplicas = 1
