# Ops auto-fix — collect prod errors → GitHub action items → Cloud Agent

name: Ops auto-fix

on:
  schedule:
    # Every 20 min — aligned with cron-staleness-watchdog cadence
    - cron: "*/20 * * * *"
  workflow_dispatch:
  workflow_run:
    workflows:
      - RTH deep audit
      - Cron audit query
      - Deploy smoke
      - RTH pre-open smoke
      - RTH open check
      - RTH autonomous open
      - RTH continuous monitor
      - Off-hours health
      - Railway audit apply
      - Railway cron config check
    types:
      - completed

permissions:
  contents: read
  issues: write

# Prevent overlapping collectors (20-min ticks + workflow_run triggers) from
# double-dispatching. Don't cancel a run mid issue-creation/agent-dispatch —
# let it finish; the next tick covers anything it missed.
concurrency:
  group: ops-auto-fix
  cancel-in-progress: false

jobs:
  collect-and-dispatch:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Ensure ops-auto-fix label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ops-auto-fix \
            --repo "${{ github.repository }}" \
            --color d73a4a \
            --description "Autonomous agent action items (cron/errors)" \
            2>/dev/null || true

      - name: Collect action items (prod)
        id: collect
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_TARGET_BASE_URL: https://blackouttrades.com
        run: |
          set +e
          node scripts/ops-collect-action-items.mjs > /tmp/ops.json 2>/dev/null
          node scripts/tool-agents/export-action-items.mjs > /tmp/tool.json 2>/dev/null
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const a = fs.existsSync('/tmp/ops.json') ? JSON.parse(fs.readFileSync('/tmp/ops.json','utf8')) : { items: [] };
            const b = fs.existsSync('/tmp/tool.json') ? JSON.parse(fs.readFileSync('/tmp/tool.json','utf8')) : { items: [] };
            const items = [...(a.items||[]), ...(b.items||[])];
            const fp = items.length ? crypto.createHash('sha256').update(items.map(i=>i.id).sort().join('|')).digest('hex').slice(0,12) : 'none';
            fs.writeFileSync('action-items.json', JSON.stringify({ generated_at: new Date().toISOString(), fingerprint: fp, count: items.length, items }));
          "
          code=0
          count=$(node -e "const j=JSON.parse(require('fs').readFileSync('action-items.json','utf8')); console.log(j.count||0)")
          if [ "$count" -gt 0 ]; then code=1; fi
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "=== Action items ($count) ==="
            node -e "JSON.parse(require('fs').readFileSync('action-items.json','utf8')).items.forEach(i=>console.log(i.priority, i.title))"
          else
            echo "GREEN — no ops action items"
          fi

      - name: Dispatch GitHub issue + Cloud Agent
        if: steps.collect.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/ops-dispatch-agent.mjs --file action-items.json

      - name: Summary
        if: always()
        run: |
          if [ -f action-items.json ]; then
            node -e "
              const j=JSON.parse(require('fs').readFileSync('action-items.json','utf8'));
              console.log('Fingerprint:', j.fingerprint, '| Items:', j.count);
            "
          fi
