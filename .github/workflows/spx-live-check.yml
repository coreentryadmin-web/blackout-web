name: spx-live-check

# Authenticated live-UI capture of the SPX Slayer desk (/dashboard): full desk
# screenshot + EOD Pin Forecaster + GEX matrix/bead rail + live values, so
# successive dispatches can be diffed over an RTH session. UI only, no API polls.
on:
  workflow_dispatch:
    inputs:
      base:
        description: "Base URL"
        required: false
        default: "https://blackouttrades.com"
      stamp:
        description: "Run stamp (unique label for this capture)"
        required: false
        default: "run"

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Capture SPX desk
        env:
          VALIDATE_BASE: ${{ github.event.inputs.base }}
          RUN_STAMP: ${{ github.event.inputs.stamp }}
          SPX_CHECK_DIR: ./artifacts/spx-live-check
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: node scripts/spx-live-check.mjs
      - name: Upload capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spx-live-check-${{ github.event.inputs.stamp }}
          path: artifacts/spx-live-check/
          retention-days: 7
