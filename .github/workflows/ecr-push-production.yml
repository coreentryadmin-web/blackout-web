# Build production Docker image and push to ECR (:latest).
# Clerk auth — NOT Cognito (staging uses blackout-web-sandbox for that).
name: ECR push (production)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "deploy/Dockerfile"
      - ".dockerignore"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - ".github/workflows/ecr-push-production.yml"

permissions:
  contents: read
  id-token: write

env:
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.repository == 'coreentryadmin-web/blackout-web'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          REPO="${ECR_REPOSITORY:-blackout-web}"
          if [ -z "${REGISTRY:-}" ]; then
            echo "ECR login failed — set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION"
            exit 1
          fi
          IMAGE="${REGISTRY}/${REPO}"
          docker build -f deploy/Dockerfile \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="https://blackouttrades.com" \
            --build-arg GITHUB_SHA="${{ github.sha }}" \
            -t "${IMAGE}:${IMAGE_TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${IMAGE_TAG}"
          docker push "${IMAGE}:latest"
          echo "Pushed ${IMAGE}:${IMAGE_TAG} and :latest"

      - name: Purge Cloudflare edge cache
        if: env.CF_ZONE_ID != '' && env.CF_API_TOKEN != ''
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cloudflare cache purged after image push."
