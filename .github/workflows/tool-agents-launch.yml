# Launch seven tool-specific Cloud Agents at RTH open

name: Tool agents launch

on:
  schedule:
    - cron: "31 13 * * 1-5"
    - cron: "31 14 * * 1-5"
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Launch seven tool agents (Cursor Cloud)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: node scripts/tool-agents/launch-cloud-agents.mjs
