# X mention replies — drive Replies metric + profile visits.
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
watchPatterns = ["scripts/hit-cron.mjs", "railway.x-replies.toml", "nixpacks.toml"]

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/x-replies"
cronSchedule = "0 13,17,22 * * 1-5"
restartPolicyType = "ON_FAILURE"
numReplicas = 1
