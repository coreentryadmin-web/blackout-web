# BlackOut iOS — Codemagic CI/CD (monorepo: apps/blackout-ios)
#
# Connect repo coreentryadmin-web/blackout-web in Codemagic — this file is at repo root.
# See apps/blackout-ios/APP_STORE.md for Apple IDs and setup checklist.

workflows:
  ios-release:
    name: BlackOut iOS Release
    working_directory: apps/blackout-ios
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BlackOut ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.blackout-trades.app
      vars:
        BUNDLE_ID: "com.blackout-trades.app"
        APPLE_TEAM_ID: "ZA32C782N5"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6787797476
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci || npm install
      - name: Generate native iOS project (Capacitor)
        script: |
          npx cap add ios || echo "ios platform already present"
          npx cap sync ios
      - name: Set up code signing (auto via App Store Connect API key)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
