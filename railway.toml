[build]
builder = "nixpacks"
buildCommand = "DATABASE_URL=$DATABASE_PUBLIC_URL npm run build"
# Only redeploy prod when build-affecting files change — NOT on docs/log-only commits.
# The autonomous SDLC crons commit docs/auto/* + audit/log .md files frequently; without this
# every such commit auto-redeployed prod, restarting the live server (churning the WS feeds and
# killing long Night Hawk edition builds mid-run). "/**" watches everything; "!/docs/**" excludes
# pure documentation, which never affects the build or runtime.
watchPatterns = ["/**", "!/docs/**"]

[deploy]
startCommand = "next start -H 0.0.0.0 -p $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
