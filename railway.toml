[build]
# Must stay nixpacks — a root Dockerfile makes Railway ignore this file and deploy via
# `node server.js` (standalone) instead of `next start -H 0.0.0.0 -p $PORT`, which fails healthcheck.
builder = "nixpacks"
buildCommand = "bash scripts/railway-build.sh"
# Only redeploy prod when build-affecting files change — NOT on docs/log-only commits.
# The autonomous SDLC crons commit docs/auto/* + audit/log .md frequently; without this every
# such commit auto-redeployed prod, restarting the live server (WS churn) and killing long Night
# Hawk edition builds mid-run. Explicit code/config/deps/public watch list; docs/** is excluded
# (it never affects the build). NOTE: a leading-slash "/**" matched NOTHING on Railway and skipped
# the whole deploy — repo-relative globs like "src/**" are the working form.
watchPatterns = [
  "src/**",
  "public/**",
  "package.json",
  "package-lock.json",
  "tsconfig.json",
  "next.config.*",
  "tailwind.config.*",
  "postcss.config.*",
  "nixpacks.toml",
  "railway.toml",
  "scripts/railway-build.sh",
]

[deploy]
startCommand = "next start -H 0.0.0.0 -p $PORT"
healthcheckPath = "/api/ready"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
